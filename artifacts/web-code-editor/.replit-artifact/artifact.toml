kind = "web"
previewPath = "/"
title = "WebCode Studio"
version = "1.0.0"
id = "artifacts/web-code-editor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20757

[services.development]
run = "pnpm --filter @workspace/web-code-editor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web-code-editor", "run", "build" ]
publicDir = "artifacts/web-code-editor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20757"
BASE_PATH = "/"
